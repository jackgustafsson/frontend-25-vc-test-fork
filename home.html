<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Snygga Webbplats</title>
    <style>
        /* Grundinställningar för att hålla footern i botten */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column; /* Staplar innehållet vertikalt */
            background-color: #f4f7f6;
        }

        /* Navigering */
        nav {
            background-color: #333;
            padding: 1rem;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        /* Huvudinnehåll - växer för att fylla utrymmet */
        main {
            flex: 1; 
            padding: 40px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .container div {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- FOOTER STYLING --- */
        footer {
            background-color: #222;
            color: #ccc;
            padding: 2rem 1rem;
            text-align: center;
            margin-top: 40px;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            margin-bottom: 15px;
        }

        .footer-links a {
            color: dodgerblue;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .copyright {
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <nav>
        <a href="home.html">Hem</a>
        <a href="index.html">Galleri</a>
    </nav>

    <main>
        <div class="container">
            <div><img src="img/pic1.png" alt="Bild 1"></div>
            <div><img src="img/pic2.png" alt="Bild 2"></div>
            <div><img src="img/pic3.png" alt="Bild 3"></div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">Om oss</a>
                <a href="#">Kontakt</a>
                <a href="#">Integritetspolicy</a>
            </div>
            <p class="copyright">© 2024 Ditt Namn/Företag. Alla rättigheter förbehållna.</p>
        </div>
    </footer>

</body>
</html>
